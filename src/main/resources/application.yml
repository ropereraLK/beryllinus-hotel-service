server:
  port: 9090

logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.boot.autoconfigure.flyway: DEBUG
    root: INFO
    org.springframework.cache: TRACE
    com.beryllinus.backend: TRACE
    org.springframework.data.redis: TRACE

spring:
  datasource:
    url: ${db_url}
    username: ${db_username}
    password: ${db_password}

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  cache:
    type: redis

  data: # For development only
    redis:
      host: localhost
      port: 6379
      database: 0

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Kafka Configs
  kafka:
    bootstrap-servers: your-kafka-host.aivencloud.com:12345

    producer:
      acks: all
      retries: 3

      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

      properties:
        enable.idempotence: true

    properties:
      security.protocol: SSL

      ssl.truststore.location: classpath:client.truststore.jks
      ssl.truststore.password: ${TRUSTSTORE_PASSWORD}

      ssl.keystore.location: classpath:client.keystore.p12
      ssl.keystore.password: ${KEYSTORE_PASSWORD}
      ssl.keystore.type: PKCS12

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,caches

  metrics:
    enable:
      cache: true

booking:
  maxSearchDaysAhead: 364
  maxStayLength: 30

cache:
  defaultTtl: 5m
  roomClassesTtl: 24h

kafka:
  topics:
    booking: booking-events
    payment: payment-events
    inventory: inventory-events