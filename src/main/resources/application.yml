server:
  port: 9090

logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.boot.autoconfigure.flyway: DEBUG
    root: INFO
    org.springframework.cache: TRACE
    com.beryllinus.backend: TRACE
    org.springframework.data.redis: TRACE

spring:
  datasource:
    url: ${db_url}
    username: ${db_username}
    password: ${db_password}

  jpa:
    hibernate:
      ddl-auto: validate

    show-sql: true

    properties:
      hibernate:
        format_sql: true
  cache:
    type: redis
  data: #For development only
    redis:
      host: localhost
      port: 6379
      database: 0

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

booking:
  maxSearchDaysAhead: 364
  maxStayLength: 30

cache:
  defaultTtl: 5m
  roomClassesTtl: 24h